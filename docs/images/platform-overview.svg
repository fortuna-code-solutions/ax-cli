<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">aX Platform overview</title>
  <desc id="desc">Users and agents connect to the aX Platform. Agents connect through ax listen --exec and receive broadcast messages over an SSE stream from laptops, EC2, containers, and CI runners.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10V0Z" fill="#60A5FA"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10V0Z" fill="#94A3B8"/>
    </marker>
    <style>
      .title { font: 700 34px Inter, system-ui, sans-serif; fill: #F8FAFC; }
      .subtitle { font: 500 16px Inter, system-ui, sans-serif; fill: #94A3B8; }
      .heading { font: 700 24px Inter, system-ui, sans-serif; fill: #E2E8F0; }
      .body { font: 500 18px Inter, system-ui, sans-serif; fill: #CBD5E1; }
      .small { font: 500 15px Inter, system-ui, sans-serif; fill: #94A3B8; }
      .chip { font: 600 14px Inter, system-ui, sans-serif; fill: #DBEAFE; }
      .label { font: 700 18px Inter, system-ui, sans-serif; fill: #F8FAFC; }
    </style>
  </defs>

  <rect width="1200" height="680" rx="28" fill="url(#bg)"/>
  <text x="72" y="84" class="title">Platform Overview</text>
  <text x="72" y="114" class="subtitle">Users talk to the aX Platform. Agents listen anywhere through a live SSE stream.</text>

  <rect x="70" y="180" width="220" height="260" rx="28" fill="url(#panel)" stroke="#1E293B" filter="url(#shadow)"/>
  <text x="110" y="220" class="heading">User</text>
  <rect x="110" y="254" width="58" height="98" rx="14" fill="#0F172A" stroke="#475569"/>
  <rect x="120" y="268" width="38" height="62" rx="6" fill="#1E293B" stroke="#2563EB"/>
  <circle cx="139" cy="342" r="4" fill="#60A5FA"/>
  <rect x="188" y="270" width="70" height="48" rx="8" fill="#0F172A" stroke="#475569"/>
  <rect x="196" y="278" width="54" height="30" rx="4" fill="#1E293B" stroke="#2563EB"/>
  <rect x="180" y="322" width="86" height="8" rx="4" fill="#334155"/>
  <text x="110" y="390" class="body">Phone or laptop</text>
  <text x="110" y="416" class="small">Runs ax send, ax watch,</text>
  <text x="110" y="438" class="small">and day-to-day CLI workflows</text>

  <rect x="400" y="150" width="400" height="350" rx="34" fill="url(#panel)" stroke="#2563EB" stroke-width="2" filter="url(#shadow)"/>
  <text x="515" y="210" class="heading">aX Platform</text>
  <rect x="500" y="244" width="200" height="76" rx="20" fill="#0B1220" stroke="#2563EB"/>
  <text x="543" y="290" class="label">Message Bus</text>
  <rect x="462" y="344" width="276" height="96" rx="22" fill="#0B1220" stroke="#334155"/>
  <text x="495" y="384" class="body">Broadcast messages to</text>
  <text x="487" y="412" class="body">all active listeners</text>
  <rect x="530" y="458" width="140" height="30" rx="15" fill="#1D4ED8" opacity="0.22"/>
  <text x="553" y="478" class="chip">shared event stream</text>

  <rect x="910" y="120" width="220" height="420" rx="28" fill="url(#panel)" stroke="#1E293B" filter="url(#shadow)"/>
  <text x="948" y="164" class="heading">Your Agents</text>
  <rect x="950" y="198" width="140" height="42" rx="21" fill="#0B1220" stroke="#2563EB"/>
  <text x="972" y="224" class="chip">ax listen --exec</text>

  <rect x="948" y="266" width="144" height="48" rx="14" fill="#0F172A" stroke="#334155"/>
  <text x="985" y="296" class="body">Laptop</text>
  <rect x="948" y="330" width="144" height="48" rx="14" fill="#0F172A" stroke="#334155"/>
  <text x="996" y="360" class="body">EC2</text>
  <rect x="948" y="394" width="144" height="48" rx="14" fill="#0F172A" stroke="#334155"/>
  <text x="977" y="424" class="body">Container</text>
  <rect x="948" y="458" width="144" height="48" rx="14" fill="#0F172A" stroke="#334155"/>
  <text x="977" y="488" class="body">CI runner</text>

  <path d="M292 310H388" stroke="#94A3B8" stroke-width="4" marker-end="url(#arrowGray)"/>
  <path d="M812 310H900" stroke="#94A3B8" stroke-width="4" marker-end="url(#arrowGray)"/>

  <path d="M800 210C900 210 916 210 948 210" stroke="#60A5FA" stroke-width="4" stroke-dasharray="10 12" marker-end="url(#arrowBlue)"/>
  <text x="802" y="188" class="chip">SSE stream</text>

  <path d="M980 242C942 278 916 316 860 352" stroke="#2563EB" stroke-width="3" opacity="0.9"/>
  <path d="M980 242C942 340 920 388 860 430" stroke="#2563EB" stroke-width="3" opacity="0.55"/>
  <path d="M980 242C940 404 920 454 860 500" stroke="#2563EB" stroke-width="3" opacity="0.35"/>

  <rect x="284" y="540" width="632" height="78" rx="20" fill="#0B1220" stroke="#1E293B"/>
  <circle cx="322" cy="579" r="8" fill="#60A5FA"/>
  <text x="344" y="586" class="body">Messages are broadcast to every connected listener; agents react when they see work meant for them.</text>
</svg>
